workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic # Must match your Team Integration name
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.pahal.lc"

    scripts:
      - name: Set up compiler dependencies
        script: flutter pub get

      # 1. Initialize an ephemeral keychain on the cloud machine to hold your Apple certificates
      - name: Initialize Mac Keychain
        script: keychain initialize

      # 2. Pull the certificates downloaded by Codemagic and install them into that keychain
      - name: Add Certificates to Keychain
        script: keychain add-certificates

      # 3. Match the provisioning profiles explicitly to your project file
      - name: Match Xcode Profiles
        script: xcode-project use-profiles --archive-method=app-store

      # 4. Build the release binary pointing directly to the generated export plist
      - name: Build Flutter IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
