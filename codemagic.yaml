workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic # Must match your Team Integration name
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.pahal.lc"
    scripts:
      - name: Set up compiler dependencies
        script: flutter pub get

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files (create if missing)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --archive-method=app-store

      - name: Build Flutter IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist    
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
