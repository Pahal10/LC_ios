workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        certificates:
          - LC
        provisioning_profiles:
          - LC
    scripts:
      - name: Set up compiler dependencies
        script: flutter pub get
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --archive-method=app-store
      - name: Build Flutter IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
