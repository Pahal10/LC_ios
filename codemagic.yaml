workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic     # <-- replace with YOUR integration name from Phase 4
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pahal.lc   # <-- replace with YOUR bundle ID from Phase 3
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - pbhatti10@g.ucla.edu     # <-- put YOUR email here to get build notifications
      app_store_connect:
        auth: integration
        submit_to_testflight: true
