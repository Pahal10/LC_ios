workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: codemagic
    environment:
      flutter: stable
      xcode: latest
      vars:
        BUNDLE_ID: "com.pahal.lc"
        # 👇 GLOBAL ENVIRONMENT INJECTIONS FOR FLUTTER/XCODE
        DEVELOPMENT_TEAM: "XX8NLKN253"
        CODE_SIGN_STYLE: "Manual"

    scripts:
      - name: Set up compiler dependencies
        script: flutter pub get

      - name: Fetch and Install Apple Certificates/Profiles
        script: xcode-project use-profiles --archive-method=app-store

      - name: Build Flutter IPA
        script: flutter build ipa --release --export-options-plist=$HOME/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
