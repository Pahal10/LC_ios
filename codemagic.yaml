workflows:
  ios-release:
    name: iOS Release

    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable

      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pahal.lc

      vars:
        APP_STORE_APPLE_ID: 6792295616

    cache:
      cache_paths:
        - ~/.pub-cache
        - $HOME/Library/Caches/CocoaPods
        - ios/Pods

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID") + 1))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
